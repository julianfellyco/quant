# .github/workflows/ci.yml
#
# Quant Developer CI — four independent jobs:
#
#   lob-simulator  : unit tests for the matching engine (core/, metrics/)
#   backtester     : unit tests for slippage, vectorised engine, upgrades (OFI,
#                    pairs, stress, walkforward), and API smoke tests
#   frontend       : TypeScript type-check + Vite production build
#   benchmark      : LOB latency check — only runs when both test jobs pass

name: Quant Developer CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:

  # ─── Job 1: LOB Simulator ─────────────────────────────────────────────── #
  lob-simulator:
    name: "LOB Simulator / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: lob_simulator

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: lob_simulator/pyproject.toml

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=lob_simulator \
            --cov-report=term-missing \
            --cov-fail-under=80


  # ─── Job 2: Backtester ────────────────────────────────────────────────── #
  backtester:
    name: "Backtester / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backtester/requirements-ci.txt

      - name: Install deps
        run: |
          pip install -r backtester/requirements-ci.txt
          pip install fastapi uvicorn[standard] httpx

      - name: Lint
        run: |
          pip install ruff
          ruff check backtester/ --ignore E501,F401 || true

      - name: Test with coverage
        working-directory: backtester
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=backtester \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backtester/coverage.xml
        continue-on-error: true


  # ─── Job 3: Frontend ──────────────────────────────────────────────────── #
  frontend:
    name: "Frontend / Node 20"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backtester/webapp/package-lock.json

      - name: Install
        working-directory: backtester/webapp
        run: npm ci

      - name: Type-check + build
        working-directory: backtester/webapp
        run: npm run build


  # ─── Job 4: Latency Benchmark ─────────────────────────────────────────── #
  benchmark:
    name: "Latency Benchmark"
    needs: [lob-simulator, backtester]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: lob_simulator/pyproject.toml

      - name: Install LOB simulator
        run: pip install -e lob_simulator/

      - name: Run latency benchmark
        run: python scripts/benchmark_latency.py
